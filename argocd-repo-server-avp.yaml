nano argocd-repo-server-avp.yaml



apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-repo-server
    app.kubernetes.io/part-of: argocd

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
      app.kubernetes.io/part-of: argocd

  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-repo-server
        app.kubernetes.io/part-of: argocd

    spec:
      serviceAccountName: argocd-repo-server

      volumes:
        - name: custom-tools
          emptyDir: {}

      initContainers:
        - name: download-avp
          image: alpine:3.18
          command:
            - sh
            - -c
          args:
            - |
              apk add --no-cache curl
              curl -L https://github.com/argoproj-labs/argocd-vault-plugin/releases/download/v1.16.1/argocd-vault-plugin_1.16.1_linux_amd64 -o /custom-tools/argocd-vault-plugin
              chmod +x /custom-tools/argocd-vault-plugin
          volumeMounts:
            - name: custom-tools
              mountPath: /custom-tools

      containers:
        - name: argocd-repo-server
          image: quay.io/argoproj/argocd:v2.11.0
          command:
            - /usr/local/bin/argocd-repo-server

          volumeMounts:
            - name: custom-tools
              mountPath: /usr/local/bin/argocd-vault-plugin
              subPath: argocd-vault-plugin

      restartPolicy: Always
