apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-plugin
  namespace: argocd
data:
  avp.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: avp
    spec:
      generate:
        command: ["sh", "-c"]
        args:
          - |
            export AVP_TYPE=kubernetes
            argocd-vault-plugin generate .
